<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVFleet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">⚡ EVFleet Management</h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded-full">Pinot + PocketBase</span>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        
        <!-- KPIs -->
        <div id="kpis" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">CO2 Ahorrado (kg)</h3>
                <p id="kpi-co2" class="text-3xl font-bold text-gray-800">0.00</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Vehículos Monitoreados</h3>
                <p id="kpi-vehiculos" class="text-3xl font-bold text-gray-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Km Promedio</h3>
                <p id="kpi-km" class="text-3xl font-bold text-gray-800">0.0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Gráfica de Pinot -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Consumo Energético por Estación (Pinot)</h2>
                <canvas id="chartCharging" width="400" height="200"></canvas>
            </div>

            <!-- Tabla de Vehículos (PocketBase) -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Flota de Vehículos (PocketBase)</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full table-auto">
                        <thead>
                            <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase">
                                <th class="px-4 py-2 text-center">ID</th>
                                <th class="px-4 py-2">Modelo</th>
                                <th class="px-4 py-2 text-center">Año</th>
                                <th class="px-4 py-2">VIN</th>
                            </tr>
                        </thead>
                        <tbody id="vehicle-table" class="text-sm text-gray-700">
                            <!-- Datos dinámicos -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Cargar KPIs de Emisiones (Pinot)
        async function loadEmissions() {
            try {
                const res = await fetch(`${API_BASE}/analytics/emissions-report`);
                const data = await res.json();
                if (data.length > 0) {
                    document.getElementById('kpi-co2').innerText = data[0].co2_total_ahorrado.toLocaleString();
                    document.getElementById('kpi-vehiculos').innerText = data[0].vehiculos_monitoreados;
                    document.getElementById('kpi-km').innerText = data[0].km_promedio_recorrido.toFixed(1);
                }
            } catch (err) { console.error("Error cargando emisiones:", err); }
        }

        // Cargar Tabla de Vehículos (PocketBase vía FastAPI)
        async function loadVehicles() {
            try {
                const res = await fetch(`${API_BASE}/vehicles/`);
                const vehicles = await res.json();
                const tbody = document.getElementById('vehicle-table');
                tbody.innerHTML = vehicles.slice(0, 10).map(v => `
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-2 text-center font-mono text-xs">${v.vehicle_id}</td>
                        <td class="px-4 py-2">${v.make} ${v.model}</td>
                        <td class="px-4 py-2 text-center">${v.model_year}</td>
                        <td class="px-4 py-2 font-mono text-xs">${v.vin}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error cargando vehículos:", err); }
        }

        // Cargar Gráfica de Energía (Pinot)
        async function loadChart() {
            try {
                const res = await fetch(`${API_BASE}/analytics/charging-summary`);
                const data = await res.json();
                
                const labels = data.map(item => `Estación ${item.station_id}`);
                const values = data.map(item => item.energia_total_kwh);

                const ctx = document.getElementById('chartCharging').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Total Energía (kWh)',
                            data: values,
                            backgroundColor: 'rgba(59, 130, 246, 0.6)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            } catch (err) { console.error("Error cargando gráfica:", err); }
        }

        // Inicializar Dashboard
        window.onload = () => {
            loadEmissions();
            loadVehicles();
            loadChart();
        };
    </script>
</body>
</html>
